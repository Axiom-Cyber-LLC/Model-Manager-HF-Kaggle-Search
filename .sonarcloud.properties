# SonarCloud Automatic Analysis configuration.
#
# model_manager_previous.py and model_manager_v*.py are frozen historical
# snapshots kept for reference. Security fixes applied across them are
# inherently identical to the live model_manager.py, so exclude the
# snapshots from copy-paste detection (CPD) to keep the new-code
# duplication metric meaningful. They remain fully analyzed for bugs,
# vulnerabilities, and code smells.
sonar.cpd.exclusions=model_manager_previous.py,model_manager_v*.py
